<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bookmark Brain</title>
    <style>
        h1{
            font-size: 35px;
            font-weight: Bold;
            color:darkgoldenrod
        }
        #search-box{
            width:100%;
            padding: 10px 12px;
            border: 1.5px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
            color: darkorange;
        }
            #search-box:focus {
            border-color: #3b3b98;
        }
        #search-btn {
        margin-top: 10px;
        width: 100%;
        padding: 10px;
        background-color:gold;
        color: rgb(0, 0, 0);
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.2s;
      }
      #toggle-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

#toggle-label {
    font-size: 13px;
    color: #555;
}
       body {
        width: 450px;
        font-family: 'Segoe UI', sans-serif;
        background-color: #f9f9f9;
        padding: 18px;
        color: #1a1a1a;
      }
       #search-btn:hover {
        background-color: darkorange;
      }
      #results {
        margin-top: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }.result-card {
        background: white;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 10px 12px;
      }

      .result-card a {
        font-size: 13px;
        font-weight: 600;
        color: #3b3b98;
        text-decoration: none;
        display: block;
        margin-bottom: 4px;
      }.result-card a:hover {
        text-decoration: underline;
      }

      .result-card p {
        font-size: 12px;
        color: #555;
        line-height: 1.5;
      }

      #status {
        font-size: 12px;
        color: #888;
        text-align: center;
        margin-top: 12px;
      }
      .hidden {
    display: none;
}

.spinner {
    width: 24px;
    height: 24px;
    border: 3px solid #f0d080;
    border-top: 3px solid darkgoldenrod;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 16px auto;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
}
.header {
    text-align: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid gold;
}

.tagline {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
}
    </style>
</head>
<body>
    <div class="header">
    <h1>Bookmark Brain</h1>
    <div id="toggle-container">
    <span id="toggle-label">Capturing: ON</span>
    <input type="checkbox" id="toggle" checked>
</div>
    <p class="tagline">Your personal search engine</p>
</div>
    <input type="text" placeholder="Search the history" id="search-box">
    <button id="search-btn">Search</button>
    <div id="spinner" class="spinner hidden"></div> 
    <div id="results"></div>
    <p id="status"></p>
    <script src="popup.js"></script>

    
</body>

</html>
